name: "🚀 Premium Production CI/CD Pipeline"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Code Quality and Linting Check
  code-analysis:
    name: "🔍 Code Quality & Optimization Check"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js (For Premium Tooling)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🧪 Validate Repository Structure
        run: |
          echo "Checking essential files..."
          if [ ! -f index.html ]; then
            echo "❌ Error: index.html missing from root directory!"
            exit 1
          fi
          echo "✅ Repository structure looks perfectly valid."

  # Job 2: Secure Deployment to GitHub Pages
  deploy-portfolio:
    name: "🌐 Live Automated Deployment"
    needs: code-analysis
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup GitHub Pages Context
        uses: actions/configure-pages@v4

      - name: 📦 Upload Web Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository contents
          path: '.'

      - name: 🚀 Deploy to Production Live Server
        id: deployment
        uses: actions/deploy-pages@v4
