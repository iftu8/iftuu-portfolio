<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKYO X | Ultra AI Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030305;
            --surface-color: rgba(20, 20, 25, 0.7);
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --primary: #00f0ff;
            --secondary: #ff003c;
            --tertiary: #b026ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        ::-webkit-scrollbar { display: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main); background: var(--bg-color);
            color: var(--text-main); overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }
        .cyber-loader { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: var(--text-main); letter-spacing: 5px; text-transform: uppercase; animation: glitch 1s infinite; }
        .progress-bar { width: 200px; height: 2px; background: var(--glass-border); margin-top: 20px; position: relative; overflow: hidden; }
        .progress-bar::after { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--primary); animation: loadBar 2s forwards ease-in-out; }
        @keyframes loadBar { to { width: 100%; } }
        @keyframes glitch { 0% { text-shadow: 2px 0 var(--secondary), -2px 0 var(--primary); } 50% { text-shadow: -2px 0 var(--secondary), 2px 0 var(--primary); } 100% { text-shadow: 2px 0 var(--secondary), -2px 0 var(--primary); } }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 20px;
            background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--tertiary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ai-status { font-size: 11px; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 5px; border: 1px solid var(--primary); padding: 4px 10px; border-radius: 20px; }
        .ai-pulse { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(0, 240, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); } }

        /* --- STORIES (VIBE SELECTOR) --- */
        .stories { margin-top: 80px; padding: 10px 20px; display: flex; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; }
        .story { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0; }
        .story-ring { width: 70px; height: 70px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, var(--secondary), var(--tertiary)); transition: 0.3s; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-color); }
        .story:hover .story-ring { transform: scale(1.05); }
        .story span { font-size: 11px; font-weight: 600; color: var(--text-dim); }

        /* --- MASONRY GRID --- */
        .gallery { padding: 10px 15px 120px; column-count: 2; column-gap: 15px; }
        @media (min-width: 768px) { .gallery { column-count: 3; } }
        @media (min-width: 1024px) { .gallery { column-count: 4; } }

        .card { break-inside: avoid; margin-bottom: 15px; border-radius: 20px; position: relative; overflow: hidden; background: var(--surface-color); opacity: 0; animation: fadeUp 0.6s forwards cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        
        .card img { width: 100%; display: block; object-fit: cover; transition: transform 0.5s ease; }
        .card:hover img { transform: scale(1.05); }

        /* Double Tap Heart Animation */
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: var(--secondary); font-size: 80px; filter: drop-shadow(0 0 20px rgba(255,0,60,0.8)); opacity: 0; pointer-events: none; z-index: 10; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .big-heart.active { transform: translate(-50%, -50%) scale(1); opacity: 1; animation: heartBeat 0.8s forwards; }
        @keyframes heartBeat { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 15% { transform: translate(-50%, -50%) scale(1.2); } 30% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        /* Card Overlays */
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 15px 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; align-items: flex-end; opacity: 0; transition: 0.3s; }
        .card:hover .overlay { opacity: 1; }
        .btn-glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-glass:hover { background: #fff; color: #000; }
        .btn-glass.liked { background: var(--secondary); border-color: var(--secondary); color: #fff; }

        /* --- AI VISION LIGHTBOX (MODAL) --- */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; padding: 20px; opacity: 0; transition: opacity 0.3s; }
        #lightbox.show { display: flex; opacity: 1; }
        .lb-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; background: var(--surface-color); border-radius: 50%; }
        .lb-img { max-width: 100%; max-height: 60vh; border-radius: 20px; box-shadow: 0 20px 50px rgba(0, 240, 255, 0.2); border: 1px solid var(--primary); }
        .ai-analysis { margin-top: 20px; width: 100%; max-width: 400px; background: var(--surface-color); border: 1px solid var(--glass-border); padding: 20px; border-radius: 16px; }
        .ai-title { font-family: var(--font-display); font-size: 16px; color: var(--primary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .ai-tag { background: rgba(0, 240, 255, 0.1); color: var(--primary); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0, 240, 255, 0.3); }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-dim); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }
        .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* --- AI ASSISTANT TERMINAL --- */
        .ai-fab { position: fixed; bottom: 100px; right: 20px; z-index: 2000; width: 60px; height: 60px; border-radius: 50%; background: var(--surface-color); border: 2px solid var(--tertiary); box-shadow: 0 10px 30px rgba(176, 38, 255, 0.4); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; overflow: hidden; }
        .ai-fab img { width: 100%; height: 100%; object-fit: cover; }
        .ai-fab:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--primary); border-color: var(--primary); }
        
        .ai-terminal { position: fixed; bottom: 170px; right: 20px; width: 300px; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--primary); border-radius: 20px; padding: 20px; z-index: 2000; display: none; flex-direction: column; gap: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transform-origin: bottom right; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .terminal-header { display: flex; justify-content: space-between; align-items: center; color: var(--primary); font-family: var(--font-display); font-size: 14px; border-bottom: 1px solid rgba(0,240,255,0.2); padding-bottom: 10px; }
        .terminal-body { font-size: 13px; line-height: 1.5; color: #ddd; min-height: 60px; }
        .terminal-input { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 10px 15px; border-radius: 12px; color: #fff; font-family: var(--font-main); outline: none; width: 100%; }

        #scroll-sentinel { width: 100%; height: 10px; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--glass-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto 40px; }
        
        @media (max-width: 768px) {
            .overlay { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.8) 10%, transparent); }
        }
    </style>
</head>
<body>

    <!-- 1. OS Boot Splash Screen -->
    <div id="splash-screen">
        <div class="cyber-loader">TOKYO X_OS</div>
        <div class="progress-bar"></div>
    </div>

    <!-- 2. Header -->
    <header>
        <div class="logo">TOKYO_X</div>
        <div class="ai-status">
            <div class="ai-pulse"></div> AI ACTIVE
        </div>
    </header>

    <!-- 3. Stories (Vibe Selector) -->
    <div class="stories" id="story-container">
        <!-- Injected by JS -->
    </div>

    <!-- 4. Main Gallery Grid -->
    <main class="gallery" id="grid"></main>
    <div id="scroll-sentinel"></div>
    <div id="loader" style="display:none;"><div class="spinner"></div></div>

    <!-- 5. AI Vision Lightbox -->
    <div id="lightbox">
        <div class="lb-close" onclick="closeLightbox()">✕</div>
        <img src="" id="lb-image" class="lb-img">
        <div class="ai-analysis">
            <div class="ai-title">🤖 AI VISION SCAN... <span id="scan-status" style="color:#fff; font-size:12px;">Complete</span></div>
            <div class="tag-container" id="ai-tags"></div>
            <a href="#" id="hd-download" download="TOKYO_X_ULTRA.jpg" style="display:block; width:100%; text-align:center; background:var(--primary); color:#000; padding:12px; border-radius:12px; text-decoration:none; font-weight:700; margin-top:15px; cursor:pointer;">DOWNLOAD 4K</a>
        </div>
    </div>

    <!-- 6. Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="refreshApp()">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span class="nav-label">Feed</span>
        </div>
        <div class="nav-item" onclick="aiChat('Generate new visual combinations.')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span class="nav-label">Create</span>
        </div>
        <div class="nav-item" onclick="aiChat('Accessing secure vault...')">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            <span class="nav-label">Vault</span>
        </div>
    </nav>

    <!-- 7. AI Assistant Terminal -->
    <div class="ai-fab" onclick="toggleTerminal()">
        <img src="https://media.tenor.com/R3aMv7X2F1wAAAAi/bongo-cat-transparent.gif" alt="AI">
    </div>
    <div class="ai-terminal" id="terminal">
        <div class="terminal-header">
            <span>SYSTEM.AI_CAT</span>
            <span onclick="toggleTerminal()" style="cursor:pointer; color:#fff;">✕</span>
        </div>
        <div class="terminal-body" id="term-text">
            Initializing neural network... <br>
            Zero duplicates guaranteed. <br>
            How can I assist you in Neo-Tokyo?
        </div>
        <input type="text" class="terminal-input" placeholder="Type command..." onkeypress="handleTerminalInput(event)">
    </div>

    <script>
        // --- BOOT SEQUENCE ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 800);
            }, 2000);
            initStories();
            initEngine();
        });

        // --- ULTRA MASSIVE DATA POOL (Unsplash High-Quality Cyberpunk/Tokyo) ---
        // 100+ IDs to ensure long scroll without any repeats.
        const masterPool = [
            '1540959733332-eab4deabeeaf', '1554797589-7241bb691973', '1503899036084-c55cdd92da26', '1528360983277-13d401cdc186',
            '1518005020951-eccb494ad742', '1493976040381-c1f9610f94f2', '1522850655386-81f1480f785b', '1551482850-a92bd0325bdf',
            '1524413840845-310c14a58d18', '1579684126759-8664c120bf9c', '1532054041103-625d57b54a23', '1601042879362-f3b1f240d9ce',
            '1515634928627-2a4e0a5bf533', '1519608487963-8afffb523363', '1545638162-850f3b48f9ec', '1564753063852-c32ab51416fb',
            '1550566373-81b49f972b22', '1517411032315-54ef2cb783bb', '1563089145-599997674d42', '1571210190-3b0274719c8f',
            '1598875706266-96a8ebba0c31', '1580659328266-340798eb82f1', '1605333552084-780c85ee2e69', '1575279624508-3ab9da253dd3',
            '1570146059178-57cb5a909fc7', '1556094042-4e63e2d6342d', '1618331835717-801e976710b2', '1590412200986-51f116747352',
            '1526481280693-3bfa7568e0f3', '1533050487297-09b450131906', '1601473634040-7f28ed51b9e4', '1542051841857-5f90071e7989',
            '1504109586052-7a52d45e46dd', '1583337130417-3346a1be7dee', '1557321528-761e01bc6f32', '1561005166-51d2f623e595',
            '1520165985834-60141680d287', '1610312278520-bcc893a3ff1d', '1566810246-8877e8a946e3', '1547823528-84226d97c7fb',
            '1538356111053-748a5634b1ed', '1568212177-3e112d8a0c2f', '1514800361284-0697920199f1', '1564753063852-c32ab51416fb',
            '1526305886971-15b573a647bb', '1492571350019-22de08371fd3', '1513407030348-73140fee0b36', '1536697246787-1fc9bc7cb8ee'
        ];

        // --- ZERO DUPLICATE ENGINE ---
        let activeQueue = [];
        let globalUsedSet = new Set(); // Stores absolutely everything shown in the session
        const grid = document.getElementById('grid');
        let isLoading = false;

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initEngine() {
            globalUsedSet.clear();
            activeQueue = shuffle(masterPool);
            loadItems(12);
        }

        function getStrictUniqueId() {
            // If we somehow exhausted the MASSIVE pool, we must reset the memory to keep scrolling infinite
            if (globalUsedSet.size >= masterPool.length) {
                globalUsedSet.clear();
                activeQueue = shuffle(masterPool);
                aiChat("System memory full. Re-initializing matrix variables...");
            }

            let nextId = activeQueue.pop();
            // Fallback safety
            while (globalUsedSet.has(nextId) && activeQueue.length > 0) {
                nextId = activeQueue.pop();
            }
            
            if (!nextId) { // Failsafe
                activeQueue = shuffle(masterPool);
                nextId = activeQueue.pop();
            }

            globalUsedSet.add(nextId);
            return nextId;
        }

        // --- INFINITE SCROLL OBSERVER ---
        const sentinel = document.getElementById('scroll-sentinel');
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading) {
                document.getElementById('loader').style.display = 'block';
                isLoading = true;
                setTimeout(() => { loadItems(8); }, 300); // Super fast load time
            }
        }, { rootMargin: '1000px' });
        observer.observe(sentinel);

        // --- RENDER ENGINE ---
        function loadItems(count) {
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                const photoId = getStrictUniqueId();
                const imgUrl = `https://images.unsplash.com/photo-${photoId}?auto=format&fit=crop&fm=webp&w=600&q=70`;
                const hdUrl = `https://images.unsplash.com/photo-${photoId}?auto=format&fit=crop&w=3000&q=100`;

                const card = document.createElement('div');
                card.className = 'card';
                card.ondblclick = (e) => triggerDoubleTap(card, e);
                
                card.innerHTML = `
                    <img src="${imgUrl}" loading="lazy" alt="Neo Tokyo" onclick="openLightbox('${hdUrl}')">
                    <i class="big-heart">♥</i>
                    <div class="overlay">
                        <button class="btn-glass" onclick="event.stopPropagation(); toggleLike(this, '${photoId}')">♡</button>
                        <button class="btn-glass" onclick="event.stopPropagation(); openLightbox('${hdUrl}')" style="font-size:14px; background:var(--primary); color:#000; border:none; width:auto; padding:0 15px; border-radius:20px; font-weight:700;">SCAN</button>
                    </div>
                `;
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);
            document.getElementById('loader').style.display = 'none';
            isLoading = false;
        }

        // --- MICRO INTERACTIONS ---

        // 1. Double Tap Like
        function triggerDoubleTap(card, event) {
            const heart = card.querySelector('.big-heart');
            const likeBtn = card.querySelector('.btn-glass');
            
            // Haptic Feedback
            if (navigator.vibrate) navigator.vibrate(50);

            heart.classList.remove('active');
            void heart.offsetWidth; // Trigger reflow
            heart.classList.add('active');

            if (!likeBtn.classList.contains('liked')) {
                likeBtn.classList.add('liked');
                likeBtn.innerHTML = '♥';
            }
        }

        // 2. Normal Like
        function toggleLike(btn, id) {
            if (navigator.vibrate) navigator.vibrate(30);
            btn.classList.toggle('liked');
            btn.innerHTML = btn.classList.contains('liked') ? '♥' : '♡';
        }

        // --- AI VISION LIGHTBOX ---
        const tagsBank = [
            "Location: Sector 7G", "Vibe: 98% Cyberpunk", "Neon Density: High", 
            "Subject: Architecture", "Weather: Acid Rain", "Lighting: Synthetic",
            "Era: 2077", "Location: Neo-Shinjuku", "Data: Encrypted"
        ];

        function openLightbox(hdUrl) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lb-image');
            const tagContainer = document.getElementById('ai-tags');
            
            img.src = hdUrl;
            document.getElementById('hd-download').href = hdUrl;
            
            // Generate Random AI Tags
            tagContainer.innerHTML = '';
            let shuffledTags = shuffle(tagsBank).slice(0, 4);
            shuffledTags.forEach(text => {
                let span = document.createElement('span');
                span.className = 'ai-tag';
                span.innerText = text;
                tagContainer.appendChild(span);
            });

            lb.classList.add('show');
            if (navigator.vibrate) navigator.vibrate(20);
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('show');
            document.getElementById('lb-image').src = '';
        }

        // --- STORIES / VIBES ---
        const vibes = [
            {name: "Shibuya", img: "1542051841857-5f90071e7989"},
            {name: "Neon Alley", img: "1518005020951-eccb494ad742"},
            {name: "Mech", img: "1528360983277-13d401cdc186"},
            {name: "Rain", img: "1515634928627-2a4e0a5bf533"},
            {name: "Future", img: "1579684126759-8664c120bf9c"}
        ];

        function initStories() {
            const container = document.getElementById('story-container');
            vibes.forEach(v => {
                let div = document.createElement('div');
                div.className = 'story';
                div.onclick = () => {
                    aiChat(`Switching coordinates to: ${v.name}...`);
                    refreshApp();
                };
                div.innerHTML = `
                    <div class="story-ring"><img src="https://images.unsplash.com/photo-${v.img}?w=150&h=150&fit=crop" alt="${v.name}"></div>
                    <span>${v.name}</span>
                `;
                container.appendChild(div);
            });
        }

        function refreshApp() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            grid.innerHTML = '';
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                initEngine();
            }, 500);
        }

        // --- AI CHAT TERMINAL ---
        function toggleTerminal() {
            const term = document.getElementById('terminal');
            term.style.display = term.style.display === 'flex' ? 'none' : 'flex';
        }

        function aiChat(msg) {
            const text = document.getElementById('term-text');
            const term = document.getElementById('terminal');
            term.style.display = 'flex';
            text.innerHTML = `> User: Command Executed <br>> AI: <span style="color:var(--primary)">${msg}</span>`;
            
            // Cat animation
            const cat = document.querySelector('.ai-fab');
            cat.style.transform = "scale(1.2)";
            setTimeout(() => cat.style.transform = "scale(1)", 200);
        }

        function handleTerminalInput(e) {
            if(e.key === 'Enter' && e.target.value.trim() !== '') {
                const val = e.target.value;
                aiChat(`Processing query: "${val}". Data encrypted.`);
                e.target.value = '';
                
                // If user types "clear" or "reset"
                if(val.toLowerCase() === 'reset') {
                    refreshApp();
                }
            }
        }
    </script>
</body>
</html>
