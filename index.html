<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO PRO MAX | Unlimited Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030009;
            --text-color: #e0e0e0;
            --primary-neon: #00f0ff;
            --secondary-neon: #ff0055;
            --accent-purple: #9d00ff;
            --nav-bg: rgba(3, 0, 9, 0.85);
            --card-bg: rgba(15, 15, 25, 0.6);
            --font-head: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f9;
            --text-color: #0b0b1a;
            --primary-neon: #0044ff;
            --secondary-neon: #ff0055;
            --accent-purple: #8a2be2;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --card-bg: rgba(230, 230, 240, 0.8);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--primary-neon); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary-neon); }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            transition: background-color 0.4s, color 0.4s, border-color 0.4s;
            cursor: none; /* Hide default cursor for custom neon cursor */
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Custom Neon Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 9999; pointer-events: none;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--primary-neon); }
        .cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--secondary-neon);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
            box-shadow: 0 0 15px var(--secondary-neon);
        }

        /* End-to-End Privacy Banner */
        .privacy-banner {
            background: linear-gradient(90deg, var(--accent-purple), var(--primary-neon));
            color: #fff; text-align: center; font-size: 11px; font-weight: 700;
            padding: 8px; font-family: var(--font-head); letter-spacing: 3px;
            z-index: 1001; position: relative; text-shadow: 0px 0px 5px #000;
        }

        /* Ultra Premium Navbar */
        nav {
            position: sticky; top: 0; width: 100%; padding: 15px 50px;
            display: flex; flex-direction: column; gap: 15px;
            background: var(--nav-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 1000; border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .nav-top { display: flex; justify-content: space-between; align-items: center; }

        .logo {
            font-family: var(--font-head); font-size: 30px; font-weight: 700;
            letter-spacing: 5px; color: #fff;
            text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--accent-purple), 0 0 40px var(--primary-neon);
        }

        .nav-links button {
            background: transparent; color: var(--text-color);
            border: 2px solid var(--primary-neon); padding: 10px 25px;
            font-family: var(--font-head); font-size: 12px; font-weight: 700;
            border-radius: 5px; text-transform: uppercase;
            position: relative; overflow: hidden; z-index: 1;
        }
        .nav-links button::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%; background: var(--primary-neon);
            transition: 0.4s ease; z-index: -1;
        }
        .nav-links button:hover::before { left: 0; }
        .nav-links button:hover { color: #000; box-shadow: 0 0 20px var(--primary-neon); }

        /* Glowing Category Menu */
        .categories { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .cat-btn {
            background: transparent; color: rgba(255,255,255,0.5); border: none;
            font-family: var(--font-head); font-size: 13px; font-weight: 700;
            padding: 5px 10px; position: relative;
        }
        .cat-btn::after {
            content: ''; position: absolute; bottom: -5px; left: 0;
            width: 0%; height: 2px; background: var(--secondary-neon); transition: 0.3s;
            box-shadow: 0 0 10px var(--secondary-neon);
        }
        .cat-btn:hover, .cat-btn.active { color: #fff; text-shadow: 0 0 10px var(--primary-neon); }
        .cat-btn:hover::after, .cat-btn.active::after { width: 100%; }

        /* Hero Section with Verbatim Image Reference */
        header {
            height: 70vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            /* Using the exact file provided as the background */
            background: linear-gradient(to bottom, rgba(3,0,9,0.3), var(--bg-color)), 
                        url('1042211078598940529.jpeg') no-repeat center center/cover;
            border-bottom: 2px solid var(--accent-purple);
            box-shadow: 0 10px 50px rgba(157, 0, 255, 0.2);
        }

        /* Cyberpunk Glitch Effect */
        .glitch-wrapper { position: relative; margin-bottom: 20px; }
        .glitch {
            font-family: var(--font-head); font-size: 6rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 15px; color: #fff;
            position: relative; text-shadow: 0 0 20px var(--primary-neon);
        }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: transparent;
        }
        .glitch::before {
            left: 3px; text-shadow: -2px 0 var(--secondary-neon);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -3px; text-shadow: -2px 0 var(--primary-neon);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }

        p.subtitle {
            font-size: 1.3rem; max-width: 700px; color: #fff; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 5px;
            border-left: 4px solid var(--primary-neon);
        }

        /* 1000x Advanced Gallery Grid */
        .gallery-container { padding: 40px 50px; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px;
        }

        .grid-item {
            position: relative; border-radius: 10px; overflow: hidden;
            background: var(--card-bg); border: 1px solid rgba(0, 240, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            opacity: 0; transform: translateY(40px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .grid-item.visible { opacity: 1; transform: translateY(0) scale(1); }

        .grid-item img {
            width: 100%; height: 420px; object-fit: cover; display: block;
            filter: brightness(0.7) contrast(1.2); transition: 0.6s ease;
        }

        .grid-item:hover {
            border-color: var(--primary-neon);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            transform: translateY(-10px); z-index: 10;
        }

        .grid-item:hover img { filter: brightness(1.1) contrast(1.1); transform: scale(1.05); }

        /* Dynamic Glass Overlay */
        .overlay {
            position: absolute; bottom: -80px; left: 0; width: 100%; padding: 25px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.6), transparent);
            display: flex; justify-content: space-between; align-items: center;
            opacity: 0; transition: 0.4s ease-in-out;
        }
        .grid-item:hover .overlay { bottom: 0; opacity: 1; }

        .action-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 10px 18px; border-radius: 5px;
            font-family: var(--font-head); font-weight: 700; font-size: 11px;
            backdrop-filter: blur(10px); display: flex; align-items: center; gap: 8px;
            text-decoration: none; transition: 0.3s; text-transform: uppercase;
        }
        .action-btn:hover { background: var(--secondary-neon); border-color: var(--secondary-neon); color: #fff; }

        .btn-like { font-size: 1.2rem; padding: 8px 15px; border-radius: 50%; }
        .liked {
            color: #fff !important; background: var(--secondary-neon) !important;
            border-color: var(--secondary-neon) !important; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--secondary-neon);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5) rotate(-10deg); }
            100% { transform: scale(1); }
        }

        /* Sentinel for Intersection Observer */
        #scroll-sentinel { width: 100%; height: 50px; }

        /* Loader */
        .loader {
            text-align: center; padding: 40px; font-family: var(--font-head);
            color: var(--primary-neon); font-size: 20px; font-weight: 700;
            letter-spacing: 5px; display: none; text-shadow: 0 0 10px var(--primary-neon);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; text-shadow: 0 0 20px var(--primary-neon); } 100% { opacity: 0.5; } }

        /* Upgraded Cyber Cat 9000 */
        .funny-cat {
            position: fixed; bottom: 30px; right: 30px; width: 140px;
            z-index: 2000; filter: drop-shadow(0 0 15px var(--accent-purple));
            transition: 0.4s; animation: hoverCat 4s infinite ease-in-out;
        }
        .funny-cat:hover {
            transform: scale(1.3) translateY(-20px);
            filter: drop-shadow(0 0 25px var(--primary-neon));
        }
        @keyframes hoverCat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .cat-bubble {
            position: fixed; bottom: 170px; right: 40px;
            background: rgba(0, 240, 255, 0.2); border: 1px solid var(--primary-neon);
            backdrop-filter: blur(10px); color: #fff; padding: 15px 20px;
            border-radius: 10px; font-weight: bold; font-family: var(--font-body);
            font-size: 14px; opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000; pointer-events: none; box-shadow: 0 0 20px rgba(0,240,255,0.3);
        }
        .funny-cat:hover + .cat-bubble { opacity: 1; transform: translateY(-15px) scale(1.1); }

    </style>
</head>
<body>

    <!-- Custom Cursor Elements -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <div class="privacy-banner">SYSTEM ENCRYPTED // MILITARY GRADE SECURITY // 0% LOGS</div>

    <nav>
        <div class="nav-top">
            <div class="logo">TOKYO X</div>
            <div class="nav-links">
                <button onclick="toggleTheme()" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">SYSTEM THEME</button>
            </div>
        </div>
        
        <div class="categories">
            <button class="cat-btn active" onclick="changeCategory('Cyberpunk', this)" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">CYBERPUNK</button>
            <button class="cat-btn" onclick="changeCategory('Neon Alley', this)" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">NEON ALLEY</button>
            <button class="cat-btn" onclick="changeCategory('Neo Tokyo', this)" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">NEO TOKYO</button>
            <button class="cat-btn" onclick="changeCategory('Mecha Core', this)" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">MECHA CORE</button>
            <button class="cat-btn" onclick="changeCategory('Synthwave', this)" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">SYNTHWAVE</button>
        </div>
    </nav>

    <header>
        <div class="glitch-wrapper">
            <h1 class="glitch" data-text="TOKYO" id="header-title">TOKYO</h1>
        </div>
        <p class="subtitle" id="header-sub">3000x HD • Zero Lag Engine • Unlimited Scroll</p>
    </header>

    <section class="gallery-container">
        <div class="grid" id="photo-grid"></div>
        <!-- Sentinel for Intersection Observer -->
        <div id="scroll-sentinel"></div>
        <div class="loader" id="loader">EXTRACTING NEON DATA...</div>
    </section>

    <!-- Upgraded Interactive Cat -->
    <img src="https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif" alt="Funny Cyber Cat" class="funny-cat" onclick="meow()" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">
    <div class="cat-bubble" id="bubble">System Override! Pet me! 🐾</div>

    <script>
        // --- CUSTOM NEON CURSOR LOGIC ---
        const cursorDot = document.getElementById("cursor-dot");
        const cursorOutline = document.getElementById("cursor-outline");

        window.addEventListener("mousemove", function (e) {
            const posX = e.clientX;
            const posY = e.clientY;
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            // Add a slight delay for the outline for a smooth effect
            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        function cursorHover() {
            cursorOutline.style.width = "60px";
            cursorOutline.style.height = "60px";
            cursorOutline.style.backgroundColor = "rgba(0, 240, 255, 0.1)";
        }
        function cursorLeave() {
            cursorOutline.style.width = "40px";
            cursorOutline.style.height = "40px";
            cursorOutline.style.backgroundColor = "transparent";
        }

        // --- MASSIVE 3000x PHOTO ENGINE ---
        // Expanded array for max variety
        const photoIds = [
            '1540959733332-eab4deabeeaf', '1554797589-7241bb691973', '1503899036084-c55cdd92da26',
            '1518005020951-eccb494ad742', '1528360983277-13d401cdc186', '1532054041103-625d57b54a23',
            '1493976040381-c1f9610f94f2', '1522850655386-81f1480f785b', '1551482850-a92bd0325bdf',
            '1524413840845-310c14a58d18', '1579684126759-8664c120bf9c', '1542051841857-5f90071e7989',
            '1503899036084-c55cdd92da26', '1601042879362-f3b1f240d9ce', '1554797589-7241bb691973'
        ];

        let currentCategory = 'Cyberpunk';
        let isLoading = false;
        let imageCount = 0; 
        const grid = document.getElementById('photo-grid');

        // Initial Load
        window.onload = () => {
            loadImages(12);
        };

        // --- PRO-LEVEL INTERSECTION OBSERVER (ZERO LAG) ---
        // This is 1000x better than window.onscroll
        const sentinel = document.getElementById('scroll-sentinel');
        
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading) {
                showLoader();
                setTimeout(() => {
                    loadImages(8); // Load batches of 8 smoothly
                    hideLoader();
                }, 600);
            }
        }, { rootMargin: '200px' }); // Trigger 200px before reaching the bottom

        observer.observe(sentinel);

        function loadImages(count) {
            for (let i = 0; i < count; i++) {
                imageCount++;
                const randomId = photoIds[Math.floor(Math.random() * photoIds.length)];
                
                // Add Math.random() to simulate 3000+ totally unique API hits
                const imgUrl = `https://images.unsplash.com/photo-${randomId}?auto=format&fit=crop&w=800&q=80&sig=${Math.random()}`;
                const hdUrl = `https://images.unsplash.com/photo-${randomId}?auto=format&fit=crop&w=3000&q=100&sig=${Math.random()}`;

                const item = document.createElement('div');
                item.className = 'grid-item';
                
                // Onload event triggers the CSS fade-in animation for each specific image
                item.innerHTML = `
                    <img src="${imgUrl}" loading="lazy" alt="${currentCategory} Future ${imageCount}" onload="this.parentElement.classList.add('visible')">
                    <div class="overlay">
                        <button class="action-btn btn-like" onclick="toggleLike(this)" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">🤍</button>
                        <a href="${hdUrl}" download="TOKYO_X_${imageCount}.jpg" target="_blank" class="action-btn" onmouseenter="cursorHover()" onmouseleave="cursorLeave()">⬇️ 3000x RAW</a>
                    </div>
                `;
                grid.appendChild(item);
            }
        }

        function showLoader() {
            isLoading = true;
            document.getElementById('loader').style.display = 'block';
        }

        function hideLoader() {
            isLoading = false;
            document.getElementById('loader').style.display = 'none';
        }

        // --- CATEGORY ENGINE ---
        function changeCategory(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            currentCategory = category;
            
            // Update Glitch Text Data Attribute
            const titleElement = document.getElementById('header-title');
            titleElement.innerText = category.toUpperCase();
            titleElement.setAttribute('data-text', category.toUpperCase());
            
            grid.innerHTML = '';
            imageCount = 0;
            
            showLoader();
            setTimeout(() => {
                hideLoader();
                loadImages(12);
            }, 500);
        }

        // --- LIKE ANIMATION ---
        function toggleLike(btn) {
            btn.classList.toggle('liked');
            btn.innerHTML = btn.classList.contains('liked') ? '❤️' : '🤍';
        }

        // --- THEME TOGGLE ---
        function toggleTheme() {
            const htmlTag = document.documentElement;
            htmlTag.setAttribute('data-theme', htmlTag.getAttribute('data-theme') === 'cyber' ? 'light' : 'cyber');
        }

        // --- UPGRADED CAT AI ---
        const catJokes = [
            "Purr-fect Code Compiled! 🐾", 
            "Bypassing Mainframe... Meow! 😼", 
            "Activating 3000x Overdrive! 🚀",
            "Error 404: Dog Not Found 🐶❌",
            "Are you hacking or scrolling? 🐱💻",
            "Stealing your RAM... just kidding! 😻"
        ];
        
        function meow() {
            const bubble = document.getElementById('bubble');
            const randomJoke = catJokes[Math.floor(Math.random() * catJokes.length)];
            
            bubble.innerText = randomJoke;
            bubble.style.opacity = '1';
            bubble.style.transform = 'translateY(-20px) scale(1.2)';
            bubble.style.color = 'var(--secondary-neon)';
            bubble.style.borderColor = 'var(--secondary-neon)';
            
            setTimeout(() => {
                bubble.style.opacity = '0';
                bubble.style.transform = 'translateY(0) scale(1)';
                bubble.style.color = '#fff';
                bubble.style.borderColor = 'var(--primary-neon)';
            }, 3000);
        }
    </script>
</body>
</html>
