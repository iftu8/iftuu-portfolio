<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKYO X | Quantum Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. QUANTUM VARIABLES & RESET
           ========================================= */
        :root {
            --bg-color: #030305;
            --surface-color: #0d0d12;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #ff3040;
            --tertiary: #b026ff;
            --glass: rgba(13, 13, 18, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; /* Custom Cursor */ -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }

        body {
            font-family: var(--font-main); background: var(--bg-color); color: var(--text-main);
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        canvas#particles { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0.6; }

        /* =========================================
           2. PERFORMANCE UI & CUSTOM CURSOR
           ========================================= */
        .cursor-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; box-shadow: 0 0 10px var(--primary); transition: transform 0.1s; }
        .cursor-ring { width: 30px; height: 30px; border: 1px solid var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: top 0.1s ease-out, left 0.1s ease-out, width 0.2s, height 0.2s; }
        
        .fps-monitor {
            position: fixed; top: 20px; left: 20px; z-index: 1001; font-family: var(--font-code);
            font-size: 10px; color: #0f0; background: rgba(0,255,0,0.1); border: 1px solid rgba(0,255,0,0.3);
            padding: 4px 8px; border-radius: 4px; pointer-events: none; backdrop-filter: blur(5px);
        }

        /* =========================================
           3. SPLASH SCREEN (NEON PULSE)
           ========================================= */
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color);
            z-index: 9000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .logo-box { position: relative; display: flex; justify-content: center; align-items: center; }
        .splash-logo { font-family: var(--font-display); font-size: 4rem; font-weight: 800; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.2); position: relative; z-index: 2; }
        .splash-logo::before { content: "TOKYO X"; position: absolute; left: 0; top: 0; width: 0%; height: 100%; color: var(--primary); overflow: hidden; -webkit-text-stroke: 0px; border-right: 4px solid var(--primary); animation: scan Reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards; filter: drop-shadow(0 0 20px var(--primary-glow)); }
        
        .sys-loading { margin-top: 30px; font-family: var(--font-code); font-size: 12px; color: var(--primary); letter-spacing: 2px; }
        .sys-loading span { animation: blink 1s infinite; }

        @keyframes scan Reveal { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* =========================================
           4. ULTRA-GLASS HEADER
           ========================================= */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 25px;
            background: var(--glass); backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid var(--glass-border);
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            transform: translateY(-100%); animation: dropHeader 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards;
        }
        @keyframes dropHeader { to { transform: translateY(0); } }

        .header-logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 1px; }
        .header-logo span { color: var(--primary); }
        .nav-actions { display: flex; gap: 20px; align-items: center; }
        .nav-btn { background: none; border: none; color: #fff; font-size: 20px; transition: 0.3s; }
        .nav-btn:hover { color: var(--primary); transform: translateY(-2px); filter: drop-shadow(0 0 10px var(--primary)); }

        /* =========================================
           5. OPTIMIZED INFINITE GRID
           ========================================= */
        .gallery-container { margin-top: 80px; padding: 10px 15px 120px; width: 100%; max-width: 1600px; margin-left: auto; margin-right: auto; }
        .masonry { column-count: 2; column-gap: 15px; }
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        @media (min-width: 1024px) { .masonry { column-count: 4; } }
        @media (min-width: 1440px) { .masonry { column-count: 5; } }

        .post-card {
            break-inside: avoid; margin-bottom: 15px; border-radius: 12px;
            background: var(--surface-color); border: 1px solid var(--glass-border);
            position: relative; overflow: hidden; opacity: 0; transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s;
        }
        .post-card.visible { opacity: 1; transform: translateY(0); }
        .post-card:hover { box-shadow: 0 10px 30px rgba(0,240,255,0.15); border-color: rgba(0,240,255,0.3); }

        .img-wrapper { position: relative; width: 100%; background: #1a1a24; overflow: hidden; }
        /* Skeleton Loader inside Image */
        .img-wrapper::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%); animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .post-card img {
            width: 100%; display: block; object-fit: cover; opacity: 0;
            filter: contrast(1.1) saturate(1.3) hue-rotate(-5deg); transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s;
        }
        .post-card img.loaded { opacity: 1; }
        .post-card:hover img { transform: scale(1.05); }

        /* Double Tap Heart - Instagram Pro */
        .ig-heart {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            color: var(--secondary); font-size: 90px; filter: drop-shadow(0 0 30px rgba(255, 48, 64, 0.8));
            pointer-events: none; z-index: 10;
        }
        .ig-heart.burst { animation: heartBurst 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes heartBurst { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 15% { transform: translate(-50%, -50%) scale(1.3); } 30% { transform: translate(-50%, -50%) scale(1); } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        /* Cyber Action Bar */
        .actions { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-like { font-size: 26px; color: #fff; background: none; border: none; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-like.active { color: var(--secondary); transform: scale(1.2); }
        
        .btn-download {
            background: rgba(0, 240, 255, 0.1); border: 1px solid var(--primary); color: var(--primary);
            padding: 6px 14px; border-radius: 6px; font-family: var(--font-code); font-size: 11px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; overflow: hidden; position: relative;
        }
        .btn-download:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary-glow); }

        /* Loading Sentinel */
        .loader-zone { width: 100%; height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .quantum-spinner { width: 40px; height: 40px; border: 2px solid transparent; border-top-color: var(--primary); border-bottom-color: var(--tertiary); border-radius: 50%; animation: qSpin 1s linear infinite; }
        @keyframes qSpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(0.8); } 100% { transform: rotate(360deg) scale(1); } }

        /* =========================================
           6. ADVANCED BONGO CAT AI
           ========================================= */
        .ai-fab {
            position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px;
            background: #fff; border-radius: 50%; border: 3px solid #000;
            box-shadow: 0 10px 30px rgba(0,240,255,0.4), 0 0 0 2px var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ai-fab img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .ai-fab:hover { transform: scale(1.15) rotate(-10deg); }
        .fab-ping { position: absolute; top: -5px; right: -5px; width: 15px; height: 15px; background: var(--secondary); border-radius: 50%; border: 2px solid #000; animation: ping 2s infinite; }
        @keyframes ping { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255,48,64,0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255,48,64,0); } 100% { transform: scale(0.8); } }

        .chat-box {
            position: fixed; bottom: 110px; right: 25px; width: 340px;
            background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(30px);
            border: 1px solid rgba(0,240,255,0.2); border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 2000;
            display: none; flex-direction: column; opacity: 0; transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
        }
        .chat-box.show { display: flex; opacity: 1; transform: translateY(0); }
        
        .chat-head { padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .cat-title { font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
        .cat-title::before { content: ''; width: 8px; height: 8px; background: #0f0; border-radius: 50%; box-shadow: 0 0 10px #0f0; }
        
        .chat-logs { padding: 15px; height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
        .msg.bot { background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.2); color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: linear-gradient(135deg, var(--primary), #0099ff); color: #000; font-weight: 600; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        /* Typing Indicator */
        .typing { display: none; align-self: flex-start; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; gap: 4px; }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: typeBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typeBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .chat-input-area { padding: 12px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; background: rgba(0,0,0,0.4); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; }
        .chat-input-area input { flex: 1; background: transparent; border: none; color: #fff; font-family: var(--font-main); outline: none; }
        .send-btn { background: var(--primary); border: none; width: 36px; height: 36px; border-radius: 8px; color: #000; font-weight: bold; transition: 0.2s; }
        .send-btn:hover { background: #fff; }

    </style>
</head>
<body>

    <!-- FPS Monitor -->
    <div class="fps-monitor" id="fps">FPS: 60 | MEM: OK</div>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <!-- Background Particle Canvas -->
    <canvas id="particles"></canvas>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="logo-box">
            <h1 class="splash-logo">TOKYO X</h1>
        </div>
        <div class="sys-loading">INITIALIZING QUANTUM GRID<span>...</span></div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-logo">TOKYO<span>X</span></div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="quantumRefresh()">↺</button>
            <button class="nav-btn" onclick="toggleChat(true)">💬</button>
        </div>
    </header>

    <!-- Infinite Optimized Gallery -->
    <main class="gallery-container">
        <div class="masonry" id="gallery-grid">
            <!-- Quantum JS will inject infinite DOM nodes here -->
        </div>
        <div class="loader-zone" id="infinite-trigger">
            <div class="quantum-spinner"></div>
        </div>
    </main>

    <!-- Smart Bongo Cat -->
    <div class="ai-fab" onclick="toggleChat()">
        <img src="https://media.tenor.com/R3aMv7X2F1wAAAAi/bongo-cat-transparent.gif" alt="AI Cat">
        <div class="fab-ping" id="chat-ping"></div>
    </div>

    <div class="chat-box" id="ai-chat">
        <div class="chat-head">
            <div class="cat-title">Bongo AI V2.0</div>
            <button class="nav-btn" onclick="toggleChat()" style="font-size: 14px;">✕</button>
        </div>
        <div class="chat-logs" id="logs">
            <div class="msg bot">System online. Meow! 💻 Ami Neo-Tokyo er sobcheye fast AI cat. Apnar internet koto speed?</div>
            <div class="typing" id="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="ai-input" placeholder="Terminal command or text..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">⮑</button>
        </div>
    </div>

    <script>
        /* =========================================================================
           TOKYO X : QUANTUM ENGINE (ULTRA PERFORMANCE)
           ========================================================================= */

        // 1. CUSTOM CYBER CURSOR LOGIC
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');
        
        window.addEventListener('mousemove', (e) => {
            cursorDot.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
            cursorRing.style.left = `${e.clientX}px`;
            cursorRing.style.top = `${e.clientY}px`;
        });

        document.addEventListener('mousedown', () => { cursorRing.style.width = '40px'; cursorRing.style.height = '40px'; cursorRing.style.background = 'rgba(0, 240, 255, 0.1)'; });
        document.addEventListener('mouseup', () => { cursorRing.style.width = '30px'; cursorRing.style.height = '30px'; cursorRing.style.background = 'transparent'; });

        // 2. FPS & PERFORMANCE MONITOR (Real-time Calculation)
        const fpsEl = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;
        let activeImages = 0;

        function updatePerformance() {
            const now = performance.now();
            frameCount++;
            if (now - lastTime >= 1000) {
                const fps = frameCount;
                fpsEl.innerText = `FPS: ${fps} | NODES: ${activeImages} | MEM: OPTIMIZED`;
                fpsEl.style.color = fps > 45 ? '#0f0' : (fps > 30 ? '#ff0' : '#f00');
                frameCount = 0;
                lastTime = now;
            }
            requestAnimationFrame(updatePerformance);
        }
        requestAnimationFrame(updatePerformance);

        // 3. BACKGROUND PARTICLE ENGINE (Canvas Rendering)
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height, particlesArray;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particlesArray = [];
            for (let i = 0; i < 60; i++) {
                particlesArray.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    speedY: Math.random() * -1 - 0.5,
                    opacity: Math.random() * 0.5 + 0.1
                });
            }
        }
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#00f0ff';
            particlesArray.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y += p.speedY;
                if (p.y < 0) { p.y = height; p.x = Math.random() * width; }
            });
            requestAnimationFrame(animateParticles);
        }
        initCanvas(); animateParticles();
        window.addEventListener('resize', initCanvas);

        // 4. BOOT SEQUENCE (Splash)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => { splash.remove(); }, 800);
            }, 2500);
            initQuantumGrid();
        });

        // 5. ADVANCED DOM RECYCLING & INFINITE GENERATION (The Secret to Speed)
        // Huge seed array. We use dynamic query params to ensure they never cache as the exact same image.
        const coreSeed = [
            '1542051841857-5f90071e7989', '1579684126759-8664c120bf9c', '1554797589-7241bb691973',
            '1551482850-a92bd0325bdf', '1601042879362-f3b1f240d9ce', '1564753063852-c32ab51416fb',
            '1598875706266-96a8ebba0c31', '1605333552084-780c85ee2e69', '1570146059178-57cb5a909fc7',
            '1618331835717-801e976710b2', '1601473634040-7f28ed51b9e4', '1583337130417-3346a1be7dee',
            '1610312278520-bcc893a3ff1d', '1566810246-8877e8a946e3', '1568212177-3e112d8a0c2f',
            '1526305886971-15b573a647bb', '1536697246787-1fc9bc7cb8ee', '1518005020951-eccb494ad742'
        ];
        
        let genCycle = 1;
        let isFetching = false;
        const grid = document.getElementById('gallery-grid');

        // Observer to detect when cards enter/leave screen for PERFORMANCE
        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    // Lazy load image
                    const img = entry.target.querySelector('img');
                    if (img && !img.src) {
                        img.src = img.dataset.src;
                        img.onload = () => img.classList.add('loaded');
                    }
                }
            });
        }, { rootMargin: '200px' }); // Load slightly before visible

        function initQuantumGrid() { generateNodes(12); }

        function generateNodes(amount) {
            if (isFetching) return;
            isFetching = true;
            
            const fragment = document.createDocumentFragment();
            
            for(let i=0; i<amount; i++) {
                const seedId = coreSeed[Math.floor(Math.random() * coreSeed.length)];
                // Create unique dimensions algorithmically so images look different
                const heightVar = Math.floor(Math.random() * (900 - 500 + 1) + 500); 
                const uniqueSig = `&sig=${genCycle}_${i}`; // Cache buster
                
                const imgUrl = `https://images.unsplash.com/photo-${seedId}?auto=format&fit=crop&w=600&h=${heightVar}&q=80${uniqueSig}`;
                const hdUrl = `https://images.unsplash.com/photo-${seedId}?auto=format&fit=crop&w=3000&q=100`;

                const card = document.createElement('div');
                card.className = 'post-card';
                card.ondblclick = (e) => triggerIGHeart(card, e);
                
                // Note: using data-src for Lazy Loading
                card.innerHTML = `
                    <div class="img-wrapper" style="height: ${heightVar/2}px;">
                        <img data-src="${imgUrl}" alt="Quantum Future">
                        <div class="ig-heart">♥</div>
                    </div>
                    <div class="actions">
                        <button class="btn-like" onclick="toggleLike(this)">♡</button>
                        <button class="btn-download" onclick="secureDownload('${hdUrl}')">HACK ASSET</button>
                    </div>
                `;
                
                fragment.appendChild(card);
                cardObserver.observe(card);
                activeImages++;
            }
            
            grid.appendChild(fragment);
            genCycle++;
            isFetching = false;
        }

        // Infinite Scroll Trigger
        const triggerObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                setTimeout(() => generateNodes(8), 300); // Simulate network
            }
        }, { rootMargin: '800px' });
        triggerObserver.observe(document.getElementById('infinite-trigger'));

        // 6. MICRO-INTERACTIONS
        function triggerIGHeart(card, event) {
            if (navigator.vibrate) navigator.vibrate(40);
            const heart = card.querySelector('.ig-heart');
            const likeBtn = card.querySelector('.btn-like');
            
            heart.classList.remove('burst');
            void heart.offsetWidth; // Reflow
            heart.classList.add('burst');
            
            if (likeBtn.innerText === '♡') {
                likeBtn.classList.add('active');
                likeBtn.innerText = '♥';
            }
        }

        function toggleLike(btn) {
            if (navigator.vibrate) navigator.vibrate(20);
            btn.classList.toggle('active');
            btn.innerText = btn.classList.contains('active') ? '♥' : '♡';
        }

        function quantumRefresh() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            grid.innerHTML = '';
            activeImages = 0; genCycle++;
            generateNodes(10);
            appendLog("Grid Quantum State Reset Complete. 🌀", 'bot');
        }

        async function secureDownload(url) {
            if (navigator.vibrate) navigator.vibrate([20, 50]);
            toggleChat(true);
            appendLog("Accessing Quantum Server... Injecting payload. 🚀", 'bot');
            
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const objUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = objUrl;
                a.download = `TOKYO_X_ASSET_${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(objUrl);
                setTimeout(() => appendLog("Asset Downloaded to local storage! 💾", 'bot'), 1000);
            } catch(e) {
                window.open(url, '_blank');
                appendLog("Direct download blocked. Opened in new dimension (tab). 🌌", 'bot');
            }
        }

        // 7. SMART BONGO AI LOGIC
        const chatBox = document.getElementById('ai-chat');
        const logs = document.getElementById('logs');
        const typing = document.getElementById('typing-indicator');
        const ping = document.getElementById('chat-ping');
        let chatOpen = false;

        function toggleChat(force = false) {
            chatOpen = force ? true : !chatOpen;
            if (chatOpen) {
                chatBox.classList.add('show');
                ping.style.display = 'none'; // Clear notification
            } else {
                chatBox.classList.remove('show');
            }
        }

        function appendLog(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            logs.insertBefore(div, typing);
            logs.scrollTop = logs.scrollHeight;
        }

        const brain = [
            "Apnar network speed beshi na amar code? 😉",
            "Bhai, ami ekta digital beral. Amar kono khida nai, shudhu RAM khai ami.",
            "FPS 60 pacchen to? Na pele apnar phone e ektu jhol din.",
            "Ei chobi gulo ami dark web theke hack kore enechhi. Kauke bolben na! 🤫",
            "Arektu scroll korun, nicher dike aro premium chobi ache.",
            "Code ta kemon laglo sotti kore bolben kintu!",
            "Double tap kore like dite bhulben na bhai!"
        ];

        function sendMsg() {
            const input = document.getElementById('ai-input');
            const txt = input.value.trim();
            if(!txt) return;

            appendLog(txt, 'user');
            input.value = '';
            
            // Show typing indicator
            typing.style.display = 'flex';
            logs.scrollTop = logs.scrollHeight;

            setTimeout(() => {
                typing.style.display = 'none';
                let res = "";
                const l = txt.toLowerCase();
                
                if(l.includes('fast') || l.includes('speed')) res = "Toh ki bhabechilen? Advanced memory management use korechi ami! 😎";
                else if(l.includes('boro code')) res = "Hehe, 300+ line er pure art toiri korechi apnar jonno.";
                else if(l.includes('love') || l.includes('valobashi')) res = "Ami ekta AI. Amar anubhuti nei. Tobey mach dile valo basi. 🐟";
                else res = brain[Math.floor(Math.random() * brain.length)];
                
                appendLog(res, 'bot');
                if(!chatOpen) ping.style.display = 'block'; // Show notification if closed
            }, 1200 + Math.random() * 1000);
        }
    </script>
</body>
</html>
