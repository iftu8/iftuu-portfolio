<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKYO X | Infinity Galaxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CORE VARIABLES & PREMIUM SETUP
           ========================================= */
        :root {
            --bg-color: #000000;
            --surface-color: #121212;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --primary: #00f0ff;
            --secondary: #ff3040; /* Instagram Style Red Heart */
            --tertiary: #b026ff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; } /* Hide scrollbar for app-like feel */

        body {
            font-family: var(--font-main); background: var(--bg-color);
            color: var(--text-main); overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================
           2. BEAUTIFUL LOGO ANIMATION (SPLASH)
           ========================================= */
        #premium-splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1.2s ease-in-out;
        }
        
        .animated-logo {
            font-family: var(--font-display); font-size: 3rem; font-weight: 800;
            background: linear-gradient(270deg, var(--primary), var(--tertiary), var(--primary));
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientFlow 3s ease infinite, scaleUp 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            opacity: 0; transform: scale(0.8);
        }

        .splash-subtitle {
            margin-top: 15px; font-size: 12px; font-weight: 600; color: var(--text-dim);
            letter-spacing: 4px; text-transform: uppercase; opacity: 0;
            animation: fadeIn 1s ease 1s forwards;
        }

        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes scaleUp { to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* =========================================
           3. HEADER (INSTAGRAM STYLE CLEAN)
           ========================================= */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 20px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-logo { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: #fff; }
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { font-size: 22px; cursor: pointer; color: #fff; transition: 0.2s; }
        .icon-btn:hover { color: var(--secondary); transform: scale(1.1); }

        /* =========================================
           4. INFINITE GALLERY (MASONRY & CARDS)
           ========================================= */
        .gallery-wrapper { margin-top: 80px; padding: 10px 15px 100px; }
        .masonry-grid { column-count: 2; column-gap: 15px; width: 100%; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        .post-card {
            break-inside: avoid; margin-bottom: 15px; border-radius: 16px;
            position: relative; overflow: hidden; background: var(--surface-color);
            border: 1px solid rgba(255,255,255,0.05); animation: fadeUp 0.6s forwards; cursor: pointer;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Cyberpunk Future Filter */
        .post-card img {
            width: 100%; display: block; object-fit: cover;
            filter: contrast(1.1) saturate(1.2) hue-rotate(-10deg);
            transition: transform 0.4s ease;
        }
        .post-card:hover img { transform: scale(1.03); }

        /* Instagram Style Double Tap Heart */
        .big-heart {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            color: var(--secondary); font-size: 80px; filter: drop-shadow(0 10px 20px rgba(255, 48, 64, 0.5));
            opacity: 0; pointer-events: none; z-index: 10;
        }
        .big-heart.active { animation: instaHeart 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes instaHeart { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 20% { transform: translate(-50%, -50%) scale(1.2); } 40% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        /* Action Bar */
        .action-bar { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--surface-color); }
        .action-left { display: flex; gap: 15px; }
        
        .like-btn { font-size: 24px; color: #fff; cursor: pointer; transition: 0.2s; user-select: none; }
        .like-btn.liked { color: var(--secondary); animation: popLike 0.3s ease; }
        @keyframes popLike { 50% { transform: scale(1.3); } }

        .dl-btn {
            background: var(--primary); color: #000; border: none; padding: 6px 16px;
            border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 12px;
            transition: 0.3s;
        }
        .dl-btn:hover { background: #fff; box-shadow: 0 0 15px rgba(0,240,255,0.6); }

        /* =========================================
           5. FUNNY CAT CHATBOT UI
           ========================================= */
        .cat-fab {
            position: fixed; bottom: 100px; right: 20px; z-index: 2000;
            width: 65px; height: 65px; border-radius: 50%; background: #fff;
            border: 3px solid var(--primary); box-shadow: 0 10px 25px rgba(0,240,255,0.4);
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .cat-fab img { width: 90%; height: 90%; object-fit: cover; border-radius: 50%; }
        .cat-fab:hover { transform: scale(1.1) rotate(10deg); }
        
        .chat-window {
            position: fixed; bottom: 180px; right: 20px; width: 320px;
            background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(25px);
            border: 1px solid var(--primary); border-radius: 24px; padding: 0;
            z-index: 2000; display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); transform-origin: bottom right; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .chat-header { background: linear-gradient(90deg, var(--tertiary), var(--primary)); padding: 15px; color: #fff; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { padding: 15px; height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 18px; line-height: 1.4; }
        .msg.cat { background: rgba(0,240,255,0.15); border: 1px solid rgba(0,240,255,0.3); color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.user { background: var(--primary); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }
        
        .chat-input { display: flex; padding: 10px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); }
        .chat-input input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px 10px; outline: none; font-family: var(--font-main); }
        .chat-input button { background: var(--primary); border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; cursor: pointer; color: #000; }

        /* Loader */
        #scroll-sentinel { width: 100%; height: 20px; }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto 40px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="premium-splash">
        <div class="animated-logo">TOKYO X</div>
        <div class="splash-subtitle">Infinite Future</div>
    </div>

    <header>
        <div class="header-logo">TOKYO X</div>
        <div class="header-icons">
            <div class="icon-btn" onclick="forceRefresh()">↻</div>
            <div class="icon-btn" onclick="catChat('Hello! Amar kono notun update ache?')" style="color: var(--primary);">♡</div>
        </div>
    </header>

    <main class="gallery-wrapper">
        <div class="masonry-grid" id="grid">
            </div>
        <div id="scroll-sentinel"></div>
        <div id="loader" style="display:none;"><div class="spinner"></div></div>
    </main>

    <div class="cat-fab" onclick="toggleChat()">
        <img src="https://media.tenor.com/R3aMv7X2F1wAAAAi/bongo-cat-transparent.gif" alt="Funny Cat">
    </div>

    <div class="chat-window" id="chatbot">
        <div class="chat-header">
            <span>🐾 Bongo Cat AI</span>
            <span onclick="toggleChat()" style="cursor:pointer; font-size:18px;">✕</span>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="msg cat">Meow! 😸 Ami Neo-Tokyo er sobtheke lazy hacker cat. Ki chai apnar? Free photo naki mach? 🐟</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chat-input-box" placeholder="Message Bongo..." onkeypress="handleChatInput(event)">
            <button onclick="processUserMessage()">➤</button>
        </div>
    </div>

    <script>
        /* =========================================================================
           TOKYO X : INFINITY ENGINE - ADVANCED JAVASCRIPT
           ========================================================================= */
        
        // --- 1. BOOT SEQUENCE ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('premium-splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.remove();
                    document.body.style.overflowY = 'auto'; // Enable scroll
                }, 1200);
            }, 2500); // Show beautiful animation for 2.5s
            
            initEngine();
        });

        // --- 2. MASSIVE HUMAN-LESS TOKYO/FUTURE POOL ---
        // Exclusively selected for Architecture, Neon, Cyberpunk, Empty Streets
        const futurePool = [
            '1542051841857-5f90071e7989', '1518005020951-eccb494ad742', '1528360983277-13d401cdc186',
            '1579684126759-8664c120bf9c', '1532054041103-625d57b54a23', '1515634928627-2a4e0a5bf533',
            '1554797589-7241bb691973', '1503899036084-c55cdd92da26', '1493976040381-c1f9610f94f2',
            '1551482850-a92bd0325bdf', '1524413840845-310c14a58d18', '1601042879362-f3b1f240d9ce',
            '1545638162-850f3b48f9ec', '1564753063852-c32ab51416fb', '1550566373-81b49f972b22',
            '1563089145-599997674d42', '1571210190-3b0274719c8f', '1598875706266-96a8ebba0c31',
            '1580659328266-340798eb82f1', '1605333552084-780c85ee2e69', '1575279624508-3ab9da253dd3',
            '1570146059178-57cb5a909fc7', '1556094042-4e63e2d6342d', '1618331835717-801e976710b2',
            '1590412200986-51f116747352', '1526481280693-3bfa7568e0f3', '1533050487297-09b450131906',
            '1601473634040-7f28ed51b9e4', '1504109586052-7a52d45e46dd', '1583337130417-3346a1be7dee',
            '1561005166-51d2f623e595', '1520165985834-60141680d287', '1610312278520-bcc893a3ff1d',
            '1566810246-8877e8a946e3', '1547823528-84226d97c7fb', '1538356111053-748a5634b1ed',
            '1568212177-3e112d8a0c2f', '1514800361284-0697920199f1', '1526305886971-15b573a647bb',
            '1492571350019-22de08371fd3', '1513407030348-73140fee0b36', '1536697246787-1fc9bc7cb8ee'
        ];

        let activeQueue = [];
        let isLoading = false;
        let generationCycle = 0; // Ensures infinite uniqueness

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initEngine() {
            activeQueue = shuffleArray(futurePool);
            loadMorePhotos(8); // Initial load
        }

        // --- 3. INFINITE SCROLL OBSERVER ---
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading) {
                document.getElementById('loader').style.display = 'block';
                isLoading = true;
                // Fast load simulation
                setTimeout(() => { loadMorePhotos(6); }, 400); 
            }
        }, { rootMargin: '1200px' });
        
        observer.observe(document.getElementById('scroll-sentinel'));

        // --- 4. RENDER ENGINE & INSTAGRAM LOGIC ---
        function loadMorePhotos(count) {
            const grid = document.getElementById('grid');
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                if (activeQueue.length === 0) {
                    generationCycle++;
                    activeQueue = shuffleArray(futurePool); // Reload array infinitely
                }
                
                const photoId = activeQueue.pop();
                
                // Magic: Using cycle count to slightly change crop size, making same ID look new!
                const w = 600 + (generationCycle % 3); 
                const imgUrl = `https://images.unsplash.com/photo-${photoId}?auto=format&fit=crop&fm=webp&w=${w}&q=75`;
                const hdUrl = `https://images.unsplash.com/photo-${photoId}?auto=format&fit=crop&w=3000&q=100`;

                const card = document.createElement('div');
                card.className = 'post-card';
                card.ondblclick = (e) => handleDoubleTap(card, e); // IG Style Double Tap
                
                card.innerHTML = `
                    <img src="${imgUrl}" loading="lazy" alt="Neo Tokyo Future">
                    <div class="big-heart">♥</div>
                    <div class="action-bar">
                        <div class="action-left">
                            <span class="like-btn" onclick="toggleInstaLike(this)">♡</span>
                        </div>
                        <button class="dl-btn" onclick="secureDownload('${hdUrl}', 'TOKYO_FUTURE_${photoId}')">FREE DL</button>
                    </div>
                `;
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);
            document.getElementById('loader').style.display = 'none';
            isLoading = false;
        }

        // --- 5. MICRO-INTERACTIONS (LIKES & DOWNLOADS) ---
        function handleDoubleTap(card, event) {
            if (navigator.vibrate) navigator.vibrate(50);
            
            const heartAnim = card.querySelector('.big-heart');
            const likeBtn = card.querySelector('.like-btn');
            
            // Trigger Big Heart Pop
            heartAnim.classList.remove('active');
            void heartAnim.offsetWidth; // Reflow trick
            heartAnim.classList.add('active');

            // Turn bottom button red
            if (!likeBtn.classList.contains('liked')) {
                likeBtn.classList.add('liked');
                likeBtn.innerHTML = '♥';
            }
        }

        function toggleInstaLike(btn) {
            if (navigator.vibrate) navigator.vibrate(20);
            btn.classList.toggle('liked');
            btn.innerHTML = btn.classList.contains('liked') ? '♥' : '♡';
        }

        async function secureDownload(url, filename) {
            if (navigator.vibrate) navigator.vibrate([30, 50]);
            
            // Bongo Cat Notification
            catChat("Downloading 4K Asset... Please wait! 🚀");
            toggleChat(true); 

            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${filename}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                
                setTimeout(() => { catChat("Download Complete! Free forever. 🎁"); }, 1000);
            } catch (err) {
                window.open(url, '_blank'); // Fallback
                catChat("Opened in new tab! Direct save korar jonno long-press korun. 📸");
            }
        }

        function forceRefresh() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('grid').innerHTML = '';
            initEngine();
            catChat("Grid refreshed! Notun Tokyo dimension load kora hocche... 🌀");
        }

        // --- 6. FUNNY BONGO CAT CHATBOT ---
        function toggleChat(forceOpen = false) {
            const chat = document.getElementById('chatbot');
            if(forceOpen) {
                chat.style.display = 'flex';
            } else {
                chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
            }
        }

        function catChat(msg, isUser = false) {
            const body = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'cat'}`;
            div.innerText = msg;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight; // Auto scroll to bottom
        }

        const catJokes = [
            "Bhai ami code likhte likhte klanto, ektu mach khawaben? 🐟",
            "Tumi ki jano ei chobi gulo 2077 sal theke anchi ami? 😎",
            "Instagram er theke amar design bhalo na? Sotti bolbe kintu! 💅",
            "Download free kintu amar like koi? Double tap koro ekhuni! 😡♥",
            "Error 404: Ami ghumacchi. Pore text korun. 😴",
            "Code jotoi boro hok, amar theke cute keu nai web e! 😸",
            "Matrix hack kora sesh. Ekhon shudhu unlimited scroll koro."
        ];

        function handleChatInput(e) {
            if (e.key === 'Enter') processUserMessage();
        }

        function processUserMessage() {
            const input = document.getElementById('chat-input-box');
            const text = input.value.trim();
            if (!text) return;

            catChat(text, true); // Add user msg
            input.value = '';

            // Funny AI Delay
            setTimeout(() => {
                let reply = "";
                const lower = text.toLowerCase();
                
                if (lower.includes('hello') || lower.includes('hi')) reply = "Meow! Ki khobor boss? 🐾";
                else if (lower.includes('boro code')) reply = "Haa bhai, code to onek boro diyechi! Ekhon khushi? 😂";
                else if (lower.includes('love')) reply = "Amar jonno love? Aww! Kintu ami shudhu mach valobashi. 🐟";
                else if (lower.includes('free')) reply = "Haa sob free! Kono premium subscription lagbe na.";
                else reply = catJokes[Math.floor(Math.random() * catJokes.length)];

                catChat(reply);
            }, 800);
        }
    </script>
</body>
</html>
