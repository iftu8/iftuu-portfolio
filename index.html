<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO | Unlimited Future Photos</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Pro Max Cyberpunk Colors */
            --bg-color: #05010d;
            --text-color: #e0e0e0;
            --primary-neon: #00f0ff;
            --secondary-neon: #ff0055;
            --accent-purple: #7000ff;
            --nav-bg: rgba(5, 1, 13, 0.7);
            --card-bg: rgba(20, 20, 30, 0.5);
            --font-head: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f9;
            --text-color: #0b0b1a;
            --primary-neon: #0055ff;
            --secondary-neon: #ff0055;
            --accent-purple: #8a2be2;
            --nav-bg: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(240, 240, 245, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(112, 0, 255, 0.1), transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.1), transparent 50%);
        }

        /* Premium Glassmorphism Navbar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-family: var(--font-head);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--accent-purple);
            cursor: pointer;
        }

        .nav-links button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--primary-neon);
            padding: 10px 25px;
            margin-left: 15px;
            font-family: var(--font-head);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .nav-links button:hover {
            background: var(--primary-neon);
            color: #000;
            box-shadow: 0 0 20px var(--primary-neon);
            transform: translateY(-2px);
        }

        /* Hero Section */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-family: var(--font-head);
            font-size: 6rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: transparent;
            -webkit-text-stroke: 2px var(--primary-neon);
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            margin-bottom: 15px;
            position: relative;
        }

        h1::after {
            content: 'TOKYO';
            position: absolute;
            left: 0;
            top: 0;
            color: var(--secondary-neon);
            -webkit-text-stroke: 0px;
            opacity: 0.5;
            filter: blur(15px);
            z-index: -1;
        }

        p.subtitle {
            font-size: 1.5rem;
            max-width: 700px;
            color: #b0b0c0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Pro Max Gallery with Hover Effects */
        .gallery-container {
            padding: 40px 60px;
        }

        .gallery-title {
            font-family: var(--font-head);
            font-size: 2rem;
            margin-bottom: 40px;
            color: #fff;
            display: inline-block;
            border-bottom: 3px solid var(--secondary-neon);
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .grid-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .grid-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            filter: brightness(0.8);
        }

        .grid-item:hover img {
            filter: brightness(1.1);
            transform: scale(1.08);
        }

        /* Hover Overlay for Like & Download */
        .overlay {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: 0.4s ease-in-out;
        }

        .grid-item:hover .overlay {
            bottom: 0;
            opacity: 1;
        }

        /* Action Buttons */
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 700;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .action-btn:hover {
            background: var(--primary-neon);
            color: #000;
            border-color: var(--primary-neon);
        }

        .btn-like {
            font-size: 1.2rem;
            padding: 10px 15px;
        }

        /* Active Love State */
        .liked {
            color: #ff0055 !important;
            background: rgba(255, 0, 85, 0.2) !important;
            border-color: #ff0055 !important;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Login Modal (Keep for settings/admin if needed) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #05010d;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--primary-neon);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.2);
            text-align: center;
            width: 380px;
        }
        .modal-content h2 { font-family: var(--font-head); color: var(--primary-neon); margin-bottom: 20px; }
        .modal-content input {
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent-purple); color: #fff; border-radius: 10px; font-family: var(--font-body);
        }
        .modal-btn {
            width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; cursor: pointer;
            font-family: var(--font-head); font-weight: 700; border: none;
        }
        .btn-primary { background: var(--primary-neon); color: #000; }
        .btn-cancel { background: transparent; color: #fff; border: 1px solid var(--secondary-neon); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">TOKYO</div>
        <div class="nav-links">
            <button onclick="toggleTheme()">Dark / Light</button>
            <button onclick="openModal()">Admin Login</button>
        </div>
    </nav>

    <header>
        <h1>TOKYO</h1>
        <p class="subtitle">Future Unlimited Photos. Extremely Fast. Download for Free.</p>
    </header>

    <section class="gallery-container">
        <h2 class="gallery-title">Unlimited Collection</h2>
        <div class="grid">
            
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=800&q=80" loading="lazy" alt="Tokyo Neon">
                <div class="overlay">
                    <button class="action-btn btn-like" onclick="toggleLike(this)">🤍</button>
                    <a href="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=1920&q=100" download="Tokyo_Future_1.jpg" target="_blank" class="action-btn">⬇️ Free Download</a>
                </div>
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1554797589-7241bb691973?auto=format&fit=crop&w=800&q=80" loading="lazy" alt="Tokyo Cyber">
                <div class="overlay">
                    <button class="action-btn btn-like" onclick="toggleLike(this)">🤍</button>
                    <a href="https://images.unsplash.com/photo-1554797589-7241bb691973?auto=format&fit=crop&w=1920&q=100" download="Tokyo_Future_2.jpg" target="_blank" class="action-btn">⬇️ Free Download</a>
                </div>
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1503899036084-c55cdd92da26?auto=format&fit=crop&w=800&q=80" loading="lazy" alt="Tokyo City">
                <div class="overlay">
                    <button class="action-btn btn-like" onclick="toggleLike(this)">🤍</button>
                    <a href="https://images.unsplash.com/photo-1503899036084-c55cdd92da26?auto=format&fit=crop&w=1920&q=100" download="Tokyo_Future_3.jpg" target="_blank" class="action-btn">⬇️ Free Download</a>
                </div>
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=800&q=80" loading="lazy" alt="Tokyo Lights">
                <div class="overlay">
                    <button class="action-btn btn-like" onclick="toggleLike(this)">🤍</button>
                    <a href="https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1920&q=100" download="Tokyo_Future_4.jpg" target="_blank" class="action-btn">⬇️ Free Download</a>
                </div>
            </div>
            
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=800&q=80" loading="lazy" alt="Tokyo Future">
                <div class="overlay">
                    <button class="action-btn btn-like" onclick="toggleLike(this)">🤍</button>
                    <a href="https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1920&q=100" download="Tokyo_Future_5.jpg" target="_blank" class="action-btn">⬇️ Free Download</a>
                </div>
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1532054041103-625d57b54a23?auto=format&fit=crop&w=800&q=80" loading="lazy" alt="Tokyo Dark">
                <div class="overlay">
                    <button class="action-btn btn-like" onclick="toggleLike(this)">🤍</button>
                    <a href="https://images.unsplash.com/photo-1532054041103-625d57b54a23?auto=format&fit=crop&w=1920&q=100" download="Tokyo_Future_6.jpg" target="_blank" class="action-btn">⬇️ Free Download</a>
                </div>
            </div>

        </div>
    </section>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>SYSTEM LOGIN</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="modal-btn btn-primary">ENTER SYSTEM</button>
            <button class="modal-btn btn-cancel" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <script>
        // Pro Max Theme Toggle
        function toggleTheme() {
            const htmlTag = document.documentElement;
            if (htmlTag.getAttribute('data-theme') === 'cyber') {
                htmlTag.setAttribute('data-theme', 'light');
            } else {
                htmlTag.setAttribute('data-theme', 'cyber');
            }
        }

        // Love / Like Button Feature
        function toggleLike(btn) {
            btn.classList.toggle('liked');
            if (btn.classList.contains('liked')) {
                btn.innerHTML = '❤️';
            } else {
                btn.innerHTML = '🤍';
            }
        }

        // Modal Logic
        function openModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        window.onclick = function(event) {
            const modal = document.getElementById('loginModal');
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
