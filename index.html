<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKYO PRO MAX | Ultra Fast</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050508;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --primary: #00d4ff;
            --secondary: #9d00ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --app-nav-bg: rgba(10, 10, 15, 0.85);
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        [data-theme="light"] {
            --bg-color: #f2f2f7;
            --text-color: #1c1c1e;
            --text-muted: #8e8e93;
            --glass-bg: rgba(0, 0, 0, 0.04);
            --glass-border: rgba(0, 0, 0, 0.1);
            --app-nav-bg: rgba(255, 255, 255, 0.85);
        }

        ::-webkit-scrollbar { display: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main); background-color: var(--bg-color);
            color: var(--text-color); overflow-x: hidden; scroll-behavior: smooth;
            transition: background-color 0.4s, color 0.4s;
        }

        /* App Top Header */
        header {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, var(--bg-color) 40%, transparent);
            z-index: 1000; pointer-events: none;
        }
        
        .header-content { pointer-events: auto; display: flex; align-items: center; gap: 15px; }

        .app-title {
            font-family: var(--font-display); font-size: 24px; font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .icon-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-color); width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
            font-size: 18px; pointer-events: auto;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }

        /* Welcome Section */
        .hero { padding: 120px 5% 40px; text-align: center; }
        .hero h1 { font-family: var(--font-display); font-size: 3rem; margin-bottom: 10px; font-weight: 700; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; }

        /* Fast Masonry Grid */
        .gallery-container { padding: 0 5% 120px; min-height: 100vh; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }

        .grid-item {
            position: relative; border-radius: 20px; overflow: hidden;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
            aspect-ratio: 3/4;
        }
        .grid-item.visible { opacity: 1; transform: translateY(0); }

        .grid-item img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.6s ease; background-color: var(--glass-bg);
        }
        .grid-item:hover img { transform: scale(1.04); }

        /* Card Controls */
        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: flex-end;
            opacity: 0; transition: 0.3s ease;
        }
        .grid-item:hover .card-overlay { opacity: 1; }

        .btn-action {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3); color: #fff;
            padding: 10px 20px; border-radius: 30px; font-weight: 600;
            font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 8px;
            transition: 0.2s; cursor: pointer;
        }
        .btn-action:hover { background: #fff; color: #000; }
        
        .btn-heart { width: 42px; height: 42px; padding: 0; display: flex; justify-content: center; border-radius: 50%; }
        .btn-heart.liked { background: #ff2d55; border-color: #ff2d55; color: #fff; }

        /* App Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--app-nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 40px;
            display: flex; gap: 5px; padding: 8px; z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .nav-pill {
            background: transparent; color: var(--text-muted); border: none;
            padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: 0.3s; font-family: var(--font-main);
        }
        .nav-pill:hover { color: var(--text-color); }
        .nav-pill.active {
            background: var(--text-color); color: var(--bg-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* High Quality Animated AI Cat */
        .ai-assistant {
            position: fixed; top: 90px; right: 5%; z-index: 2000;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        
        .ai-header {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 4px 12px; display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(10px);
        }

        .ai-close { color: var(--text-muted); cursor: pointer; border: none; background: transparent; font-size: 12px; }
        .ai-close:hover { color: #ff2d55; }

        .ai-cat {
            width: 85px; filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.4));
            cursor: pointer; transition: 0.3s;
            animation: float 4s ease-in-out infinite; /* Smooth Floating Animation */
        }
        .ai-cat:hover { transform: scale(1.15) !important; filter: drop-shadow(0 0 25px var(--primary)); animation-play-state: paused; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .ai-bubble {
            background: var(--text-color); color: var(--bg-color); padding: 12px 18px;
            border-radius: 16px; border-top-right-radius: 4px; font-weight: 600;
            font-size: 13px; opacity: 0; transition: 0.3s; transform: translateY(10px);
            pointer-events: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); white-space: nowrap;
        }
        .ai-assistant:hover .ai-bubble { opacity: 1; transform: translateY(0); }

        /* Loader */
        .loader { text-align: center; padding: 20px; display: none; }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--glass-border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #scroll-sentinel { width: 100%; height: 5px; }

        @media (max-width: 768px) {
            .bottom-nav { width: 92%; justify-content: space-between; overflow-x: auto; padding: 6px 10px; }
            .nav-pill { padding: 10px 15px; font-size: 13px; white-space: nowrap; }
            .card-overlay { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.7) 10%, transparent); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="app-title">TOKYO X</div>
        </div>
        <div class="header-content">
            <button class="icon-btn" onclick="toggleTheme()" title="Switch Theme">🌗</button>
        </div>
    </header>

    <!-- High Quality Animated Cat Widget -->
    <div class="ai-assistant" id="cat-widget">
        <div class="ai-header">
            <span style="color:var(--text-muted); font-size:11px; font-weight:600;">AI Helper</span>
            <button class="ai-close" onclick="removeCat()">✕</button>
        </div>
        <!-- Using a high-quality transparent WebP animated cat -->
        <img src="https://media.tenor.com/R3aMv7X2F1wAAAAi/bongo-cat-transparent.gif" alt="AI Cat" class="ai-cat" onclick="meow()">
        <div class="ai-bubble" id="bubble">Fast & Ready! ⚡</div>
    </div>

    <section class="hero">
        <h1 id="header-title">Cyberpunk City</h1>
        <p>Ultra-Fast rendering. Zero duplicates.</p>
    </section>

    <section class="gallery-container">
        <div class="grid" id="photo-grid"></div>
        <div id="scroll-sentinel"></div>
        <div class="loader" id="loader"><div class="spinner"></div></div>
    </section>

    <nav class="bottom-nav">
        <button class="nav-pill active" onclick="changeCategory('Cyberpunk', this)">Cyberpunk</button>
        <button class="nav-pill" onclick="changeCategory('Neo Tokyo', this)">Neo Tokyo</button>
        <button class="nav-pill" onclick="changeCategory('Nightscape', this)">Nightscape</button>
        <button class="nav-pill" onclick="changeCategory('Architecture', this)">Architecture</button>
    </nav>

    <script>
        // MASSIVE Photo Pool (More options = less repetition)
        const photoPool = [
            '1540959733332-eab4deabeeaf', '1554797589-7241bb691973', '1503899036084-c55cdd92da26',
            '1528360983277-13d401cdc186', '1518005020951-eccb494ad742', '1493976040381-c1f9610f94f2',
            '1522850655386-81f1480f785b', '1551482850-a92bd0325bdf', '1524413840845-310c14a58d18',
            '1579684126759-8664c120bf9c', '1532054041103-625d57b54a23', '1601042879362-f3b1f240d9ce',
            '1515634928627-2a4e0a5bf533', '1519608487963-8afffb523363', '1545638162-850f3b48f9ec',
            '1564753063852-c32ab51416fb', '1550566373-81b49f972b22', '1517411032315-54ef2cb783bb',
            '1563089145-599997674d42', '1571210190-3b0274719c8f', '1598875706266-96a8ebba0c31',
            '1580659328266-340798eb82f1', '1605333552084-780c85ee2e69', '1575279624508-3ab9da253dd3',
            '1570146059178-57cb5a909fc7', '1556094042-4e63e2d6342d', '1618331835717-801e976710b2',
            '1590412200986-51f116747352', '1526481280693-3bfa7568e0f3', '1533050487297-09b450131906',
            '1601473634040-7f28ed51b9e4', '1542051841857-5f90071e7989', '1504109586052-7a52d45e46dd'
        ];

        let shuffledQueue = [];
        let currentIndex = 0;
        let imageCount = 0; 
        const grid = document.getElementById('photo-grid');
        let isLoading = false;

        // Strict Array Shuffle (Fisher-Yates Algorithm)
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Initialize Queue
        function initQueue() {
            let newQueue = shuffleArray(photoPool);
            
            // Check if the last photo of the previous queue is the same as the first of the new queue
            if (shuffledQueue.length > 0 && shuffledQueue[shuffledQueue.length - 1] === newQueue[0]) {
                // Swap first and second element to prevent immediate duplicate
                let temp = newQueue[0];
                newQueue[0] = newQueue[1];
                newQueue[1] = temp;
            }
            shuffledQueue = newQueue;
            currentIndex = 0;
        }

        function getNextPhotoId() {
            if (currentIndex >= shuffledQueue.length) {
                initQueue(); // Reload queue infinitely without repeats
            }
            return shuffledQueue[currentIndex++];
        }

        window.onload = () => { 
            initQueue(); 
            loadImages(12); // Load more initially for fast scroll feel
        };

        const sentinel = document.getElementById('scroll-sentinel');
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading) {
                showLoader();
                // Fast load (minimal timeout)
                setTimeout(() => { loadImages(6); hideLoader(); }, 150);
            }
        }, { rootMargin: '800px' }); // Load way before reaching bottom for seamless feel
        observer.observe(sentinel);

        function loadImages(count) {
            // Document Fragment makes rendering incredibly fast
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                imageCount++;
                const randomId = getNextPhotoId();
                
                // SPEED OPTIMIZATION: 
                // fm=webp (Fastest format)
                // w=500, q=60 (Perfect for grid, super small file size)
                const imgUrl = `https://images.unsplash.com/photo-${randomId}?auto=format&fit=crop&fm=webp&w=500&q=60`;
                
                // HIGH QUALITY DOWNLOAD: (w=3000, 100% quality)
                const hdUrl = `https://images.unsplash.com/photo-${randomId}?auto=format&fit=crop&w=3000&q=100`;

                const item = document.createElement('div');
                item.className = 'grid-item';
                
                item.innerHTML = `
                    <img src="${imgUrl}" loading="lazy" alt="Tokyo Visual" onload="this.parentElement.classList.add('visible')">
                    <div class="card-overlay">
                        <button class="btn-action btn-heart" onclick="toggleLike(this)">♡</button>
                        <a href="${hdUrl}" download="TOKYO_X_${imageCount}.jpg" target="_blank" class="btn-action" onclick="alertHD()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Get HD
                        </a>
                    </div>
                `;
                fragment.appendChild(item);
            }
            grid.appendChild(fragment);
        }

        function showLoader() { isLoading = true; document.getElementById('loader').style.display = 'block'; }
        function hideLoader() { isLoading = false; document.getElementById('loader').style.display = 'none'; }
        
        function alertHD() {
            const bubble = document.getElementById('bubble');
            bubble.innerText = "Downloading in 3000px HD! 🚀";
        }

        // --- BOTTOM NAV ENGINE ---
        function changeCategory(category, btn) {
            document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('header-title').innerText = category;
            grid.innerHTML = '';
            
            // Re-shuffle for new category feel
            initQueue();
            imageCount = 0;
            
            showLoader();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { hideLoader(); loadImages(10); }, 150); // Faster transition
        }

        // --- APP MICRO-INTERACTIONS ---
        function toggleLike(btn) {
            btn.classList.toggle('liked');
            btn.innerHTML = btn.classList.contains('liked') ? '♥' : '♡';
            btn.style.transform = "scale(1.2)";
            setTimeout(() => { btn.style.transform = "scale(1)"; }, 150);
        }

        function toggleTheme() {
            const htmlTag = document.documentElement;
            htmlTag.setAttribute('data-theme', htmlTag.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            document.getElementById('bubble').innerText = "Theme Switched! 🌗";
        }

        // --- AI ASSISTANT ---
        function removeCat() { document.getElementById('cat-widget').style.display = 'none'; }

        const aiResponses = ["No Duplicate Photos! 🚫", "WebP Fast Load Active ⚡", "I am working perfectly! 🐾", "Speed optimized 100% 🚀"];
        function meow() {
            const bubble = document.getElementById('bubble');
            bubble.innerText = aiResponses[Math.floor(Math.random() * aiResponses.length)];
        }
    </script>
</body>
</html>
